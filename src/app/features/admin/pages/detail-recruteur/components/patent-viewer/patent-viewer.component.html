<div class="space-y-8">
  <h3 class="text-sm font-black uppercase text-slate-400 tracking-[0.2em] border-b border-slate-100 pb-2">
    Patente commerciale / KBIS
  </h3>
  <div class="space-y-6">
    <div *ngIf="imageUrl" class="border border-slate-200 rounded-lg overflow-hidden">
      <img [src]="imageUrl" alt="Document Commercial" class="w-full object-cover" />
    </div>
    <div *ngIf="pdfNom" class="flex items-center gap-3 p-4 bg-slate-50 border border-slate-100 rounded-lg">
      <span class="material-symbols-outlined text-primary">picture_as_pdf</span>
      <span class="text-sm font-bold text-slate-600">{{ pdfNom }}</span>
    </div>
    <div *ngIf="!imageUrl && !pdfNom" class="text-slate-400 text-sm italic">
      Aucun document fourni.
    </div>
  </div>
</div>
