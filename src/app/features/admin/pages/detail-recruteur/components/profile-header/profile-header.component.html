<section class="flex flex-col items-center text-center space-y-6">
  <img
    [src]="photoUrl"
    [alt]="nom"
    class="w-48 h-48 rounded-full object-cover ring-8 ring-slate-50 border-4 border-white shadow-lg"
  />
  <div class="space-y-2">
    <h1 class="text-5xl font-extrabold font-headline tracking-tighter text-slate-900 uppercase">
      {{ nom }}
    </h1>
    <p class="text-2xl font-medium text-primary font-body uppercase tracking-wider">
      {{ titre }}
    </p>
  </div>
</section>
