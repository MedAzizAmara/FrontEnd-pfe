<div class="space-y-8">
  <h3 class="text-sm font-black uppercase text-slate-400 tracking-[0.2em] border-b border-slate-100 pb-2">
    Logo de l'entreprise
  </h3>

  <div class="bg-slate-50 aspect-[21/9] flex items-center justify-center border border-slate-200 rounded-xl">

    <img *ngIf="logoUrl"
         [src]="logoUrl"
         [alt]="nomEntreprise"
         class="max-h-full object-contain"
    />

    <div *ngIf="!logoUrl" class="text-center">
      <span class="material-symbols-outlined text-6xl text-primary mb-2"
            style="font-variation-settings: 'FILL' 1;">
        rocket_launch
      </span>
      <p class="text-lg font-bold text-slate-900 uppercase tracking-widest">{{ nomEntreprise }}</p>
    </div>

  </div>
</div>
