<span *ngIf="statut === 'en_attente'"
      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-amber-100 text-amber-700 border border-amber-200">
  En attente
</span>

<span *ngIf="statut === 'valide'"
      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-emerald-100 text-emerald-700 border border-emerald-200">
  Validé
</span>

<span *ngIf="statut === 'refuse'"
      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-red-100 text-red-700 border border-red-200">
  Refusé
</span>
