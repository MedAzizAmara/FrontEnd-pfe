<div class="px-4 sm:px-6 md:px-10 max-w-5xl mx-auto pb-12">

  <!-- Liste -->
  <div
    class="flex flex-col gap-4"
    *ngIf="recruteurs.length > 0; else vide"
  >
    <app-recruiter-card
      *ngFor="let recruteur of recruteurs"
      [recruteur]="recruteur"
      (accepter)="onAccepter($event)"
      (refuser)="onRefuser($event)"
      (voirDetails)="onVoirDetails($event)"
    >
    </app-recruiter-card>
  </div>

  <!-- Empty state -->
  <ng-template #vide>
    <div
      class="flex flex-col items-center justify-center py-28 text-center gap-5"
    >

      <div
        class="w-16 h-16 rounded-2xl bg-tertiary-container flex items-center justify-center shadow-sm"
      >
        <span class="material-symbols-outlined text-tertiary text-3xl">
          check_circle
        </span>
      </div>

      <div>
        <p class="font-headline text-base font-semibold text-on-surface">
          Aucun recruteur en attente
        </p>

        <p class="text-sm text-on-surface-variant mt-1">
          Tous les recruteurs ont été traités.
        </p>
      </div>

    </div>
  </ng-template>

</div>
