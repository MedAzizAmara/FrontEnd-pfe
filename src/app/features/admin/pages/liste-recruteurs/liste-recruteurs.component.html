<div class="px-6 md:px-10 max-w-5xl mx-auto pb-10">

  <div class="mb-6 flex items-center gap-2 text-sm text-on-surface-variant">
    <span class="material-symbols-outlined text-base">group</span>
    <span>{{ recruteurs.length }} recruteur(s) en attente de validation</span>
  </div>

  <div class="flex flex-col gap-4" *ngIf="recruteurs.length > 0; else vide">
    <app-recruiter-card
      *ngFor="let recruteur of recruteurs"
      [recruteur]="recruteur"
      (accepter)="onAccepter($event)"
      (refuser)="onRefuser($event)"
      (voirDetails)="onVoirDetails($event)"
    >
    </app-recruiter-card>
  </div>

  <ng-template #vide>
    <div class="flex flex-col items-center justify-center py-24 text-center text-on-surface-variant gap-4">
      <span class="material-symbols-outlined text-5xl">check_circle</span>
      <p class="text-lg font-semibold font-headline">Aucun recruteur en attente</p>
      <p class="text-sm">Tous les recruteurs ont été traités.</p>
    </div>
  </ng-template>

</div>
