<div class="rounded-3xl border border-outline-variant bg-surface-container-lowest p-6 shadow-sm">
  <div class="flex flex-col gap-5 lg:flex-row lg:items-start lg:justify-between">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.16em] text-primary">
        Postuler à cette offre
      </p>

      <h1 class="mt-2 font-headline text-2xl font-bold text-on-surface md:text-3xl">
        {{ titre }}
      </h1>

      <div class="mt-3 flex flex-wrap items-center gap-2 text-sm text-on-surface-variant">
        <span>{{ entreprise }}</span>
        <span>•</span>
        <span>{{ localisation }}</span>
        <span>•</span>
        <span>{{ typeContrat }}</span>
        <ng-container *ngIf="modeTravail">
          <span>•</span>
          <span>{{ modeTravail }}</span>
        </ng-container>
      </div>
    </div>

    <div class="min-w-[220px] rounded-2xl border border-primary-fixed-dim bg-primary-container p-5">
      <p class="text-xs font-semibold uppercase tracking-[0.14em] text-on-primary-container">
        Score de matching
      </p>

      <div class="mt-2 flex items-end gap-2">
        <span class="text-4xl font-extrabold text-primary">
          {{ matchingScore }}%
        </span>
      </div>

      <p class="mt-1 text-sm font-medium text-on-primary-container">
        {{ scoreLabel }}
      </p>

      <div class="mt-4 h-2 w-full overflow-hidden rounded-full bg-white/70">
        <div
          class="h-full rounded-full bg-primary transition-all duration-300"
          [style.width.%]="matchingScore"
        ></div>
      </div>
    </div>
  </div>
</div>
