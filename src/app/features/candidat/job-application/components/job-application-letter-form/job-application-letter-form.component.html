<div class="rounded-3xl border border-outline-variant bg-surface-container-lowest p-6 shadow-sm">
  <div class="flex items-center justify-between gap-3">
    <div>
      <h2 class="mt-1 font-headline text-xl font-bold text-on-surface">
        Lettre de motivation
      </h2>
      <p class="mt-1 text-sm text-on-surface-variant">
        Rédigez un message clair et personnalisé pour le recruteur.
      </p>
    </div>
  </div>

  <textarea
    [ngModel]="valeur"
    (ngModelChange)="onInputChange($event)"
    rows="16"
    placeholder="Bonjour, je souhaite postuler à cette offre car mon profil correspond aux compétences recherchées..."
    class="mt-5 w-full resize-none rounded-2xl border border-outline-variant bg-surface-container-low px-4 py-4 text-sm text-on-surface outline-none focus:border-primary focus:ring-2 focus:ring-primary/20"
  ></textarea>
</div>
