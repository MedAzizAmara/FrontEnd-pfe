<section class="space-y-4">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-on-surface-variant">
        Messages
      </p>
      <h2 class="mt-1 font-headline text-2xl font-bold text-on-surface">
        Derniers messages reçus
      </h2>
      <p class="mt-1 text-sm text-on-surface-variant">
        Consultez rapidement les derniers échanges envoyés par les recruteurs.
      </p>
    </div>

    <a
      routerLink="/candidat/entretiens"
      class="inline-flex items-center gap-2 text-sm font-semibold text-primary transition hover:opacity-80"
    >
      Voir tous
      <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
    </a>
  </div>

  <div class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3">
    <article
      *ngFor="let message of messages"
      class="flex h-full flex-col rounded-2xl border border-outline-variant/50 bg-surface-container-lowest p-5 shadow-sm transition hover:border-outline"
    >
      <div class="flex items-start justify-between gap-4">
        <div class="min-w-0">
          <div class="flex items-center gap-2">
            <h3 class="truncate text-base font-semibold text-on-surface">
              {{ message.societe }}
            </h3>

            <span
              *ngIf="message.nouveau"
              class="rounded-full border border-primary/10 bg-primary-container px-2.5 py-1 text-[11px] font-semibold text-primary"
            >
              Nouveau
            </span>
          </div>

          <p class="mt-1 text-sm font-medium text-on-surface">
            {{ message.sujet }}
          </p>
        </div>

        <span class="whitespace-nowrap text-xs text-on-surface-variant">
          {{ message.date }}
        </span>
      </div>

      <p class="mt-4 text-sm leading-6 text-on-surface-variant">
        {{ message.extrait }}
      </p>

      <div class="mt-auto pt-5">
        <a
          routerLink="/candidat/message-entretien"
          class="inline-flex items-center justify-center rounded-xl border border-outline px-4 py-2.5 text-sm font-semibold text-on-surface transition hover:bg-surface-container-low"
        >
          Lire le message
        </a>
      </div>
    </article>
  </div>
</section>
