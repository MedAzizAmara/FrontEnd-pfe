<article
  class="max-w-5xl mx-auto bg-surface-container-lowest border border-outline-variant/40
         rounded-2xl p-6 md:p-10 lg:p-12
         shadow-[0_10px_30px_rgba(15,25,40,0.05)] space-y-10"
>
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div class="space-y-2">
      <div class="flex items-center gap-2 flex-wrap">
        <span
          class="px-3 py-1 rounded-full text-xs font-semibold
                 bg-tertiary-container text-tertiary"
        >
          {{ offre.statut }}
        </span>

        <span class="text-on-surface-variant text-xs">
          Publiée le {{ offre.datePublication }}
        </span>
      </div>

      <h2 class="font-headline text-xl md:text-2xl font-bold text-on-surface">
        {{ offre.entreprise }}
      </h2>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
    <div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/40">
      <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-[0.14em] mb-2">
        Titre du poste
      </p>
      <p class="text-base font-semibold text-on-surface">{{ offre.titre }}</p>
    </div>

    <div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/40">
      <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-[0.14em] mb-2">
        Type de contrat
      </p>
      <p class="text-base font-semibold text-on-surface">{{ offre.typeContrat }}</p>
    </div>

    <div class="bg-surface-container-low rounded-xl p-5 border border-outline-variant/40">
      <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-[0.14em] mb-2">
        Localisation
      </p>
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-[18px]">location_on</span>
        <p class="text-base font-semibold text-on-surface">{{ offre.localisation }}</p>
      </div>
    </div>
  </div>

  <hr class="border-outline-variant/50" />

  <div class="space-y-4">
    <h3 class="font-headline text-lg font-semibold text-on-surface">
      Description du poste
    </h3>

    <div class="space-y-3 text-sm md:text-base text-on-surface-variant leading-relaxed max-w-3xl">
      <p *ngFor="let paragraphe of descriptionParagraphs">
        {{ paragraphe }}
      </p>
    </div>
  </div>

  <div class="space-y-4">
    <h3 class="font-headline text-lg font-semibold text-on-surface">
      Compétences requises
    </h3>

    <div class="flex flex-wrap gap-2.5">
      <span
        *ngFor="let skill of competencesList"
        class="px-3.5 py-1.5 rounded-xl bg-primary-container text-on-primary-container
               text-xs font-semibold border border-primary-fixed-dim"
      >
        {{ skill }}
      </span>
    </div>
  </div>

  <div class="flex justify-end pt-6 border-t border-outline-variant/50">
    <button
      (click)="postuler()"
      class="flex items-center gap-2 px-7 py-3 rounded-xl bg-primary text-on-primary
             text-sm font-semibold shadow-sm
             hover:opacity-95 hover:shadow-md transition-all duration-200 active:scale-[0.98]"
    >
      <span class="material-symbols-outlined text-[18px]">send</span>
      Postuler à cette offre
    </button>
  </div>
</article>
