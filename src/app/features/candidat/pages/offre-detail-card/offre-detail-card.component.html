<article class="bg-white p-6 md:p-12 rounded-[2.5rem] shadow-sm border border-slate-100">

  <!-- Header -->
  <div class="mb-10 flex flex-wrap items-center justify-between gap-4">
    <div class="flex flex-col gap-3">
      <div class="flex items-center gap-3">
        <div class="px-3 py-1 rounded-full bg-tertiary/10 text-tertiary text-[10px] font-bold tracking-wider uppercase font-manrope">
          {{ offre.statut }}
        </div>
        <span class="text-on-surface-variant text-[11px] font-medium">• Publiée le {{ offre.datePublication }}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xl font-bold text-on-surface font-manrope">{{ offre.entreprise }}</span>
      </div>
    </div>
  </div>

  <!-- Basic Details -->
  <div class="mb-12">
    <div class="flex flex-col gap-6">

      <div>
        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Titre du poste</p>
        <p class="text-base font-semibold text-on-surface">{{ offre.titre }}</p>
      </div>

      <div>
        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Type de contrat</p>
        <p class="text-base font-semibold text-on-surface">{{ offre.contrat }}</p>
      </div>

      <div>
        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1.5">Localisation</p>
        <div class="flex items-center gap-1">
          <span class="material-symbols-outlined text-primary text-base">location_on</span>
          <p class="text-base font-semibold text-on-surface">{{ offre.localisation }}</p>
        </div>
      </div>

    </div>
  </div>

  <hr class="border-slate-100 mb-10"/>

  <!-- Description -->
  <div class="space-y-6">
    <h3 class="text-xl font-bold font-manrope text-on-surface">Description du poste</h3>
    <div class="text-on-surface-variant leading-relaxed space-y-4 text-sm md:text-base">
      <p *ngFor="let paragraphe of offre.description">{{ paragraphe }}</p>
    </div>
  </div>

  <!-- Compétences -->
  <div class="mt-12 space-y-6">
    <h3 class="text-xl font-bold font-manrope text-on-surface">Compétences requises</h3>
    <div class="flex flex-wrap gap-2.5">
      <span
        *ngFor="let skill of offre.competences"
        class="px-4 py-2 rounded-xl bg-slate-50 border border-slate-100 text-slate-700 text-xs font-semibold">
        {{ skill }}
      </span>
    </div>
  </div>
  <!-- Actions -->
  <div class="mt-10 flex justify-end">
    <button
      (click)="postuler()"
      class="px-6 py-3 rounded-xl bg-primary text-white text-sm font-semibold font-manrope hover:opacity-90 transition-opacity">
      Postuler à cette offre
    </button>
  </div>
</article>
