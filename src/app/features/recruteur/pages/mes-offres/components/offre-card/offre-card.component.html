<div class="bg-white p-6 rounded-lg border border-slate-100 shadow flex flex-col gap-4 h-full">

  <!-- Infos -->
  <div class="flex gap-4 items-start">
    <div class="h-12 w-12 shrink-0 bg-blue-50 rounded-lg flex items-center justify-center">
      <span class="material-symbols-outlined text-2xl text-blue-600">{{ offre.icone }}</span>
    </div>
    <div class="flex flex-col gap-1">
      <div class="flex flex-wrap items-center gap-2">
        <h3 class="text-base font-bold text-slate-900">{{ offre.titre }}</h3>
        <span class="px-2 py-0.5 rounded-full text-xs font-bold uppercase"
              [ngClass]="statutClasse">
          {{ statutLabel }}
        </span>
      </div>
      <div class="flex flex-wrap gap-x-4 gap-y-1 text-sm">
        <span class="flex items-center gap-1 font-semibold text-blue-600">
          <span class="material-symbols-outlined text-sm">group</span>
          {{ offre.candidatures }} candidatures
        </span>
        <span class="flex items-center gap-1 font-semibold text-green-600">
          <span class="material-symbols-outlined text-sm">stars</span>
          {{ offre.recommandes }} recommandés
        </span>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <hr class="border-slate-100" />

  <!-- Actions -->
  <div class="flex flex-wrap items-center gap-2 mt-auto">
    <button
      (click)="voirCandidats.emit(offre)"
      class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold text-white bg-blue-600 hover:bg-blue-700">
      <span class="material-symbols-outlined text-sm">stars</span>
      Voir candidats
    </button>
    <button
      (click)="modifier.emit(offre)"
      class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold border border-slate-300 text-slate-700 hover:bg-slate-50">
      <span class="material-symbols-outlined text-sm">edit</span>
      Modifier
    </button>
    <button
      (click)="supprimer.emit(offre)"
      class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-bold border border-red-300 text-red-500 hover:bg-red-50">
      <span class="material-symbols-outlined text-sm">delete</span>
      Supprimer
    </button>
  </div>

</div>
