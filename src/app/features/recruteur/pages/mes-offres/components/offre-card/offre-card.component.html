<div class="bg-surface-container-lowest border border-outline-variant rounded-2xl p-5
            hover:shadow-lg transition-all duration-300 flex flex-col gap-5 h-full group">

  <div class="flex items-start gap-4">
    <div class="h-11 w-11 shrink-0 bg-primary-container rounded-xl
                flex items-center justify-center
                group-hover:scale-105 transition-transform">
      <span class="material-symbols-outlined text-xl text-primary">
        {{ offre.icone }}
      </span>
    </div>

    <div class="flex flex-col gap-2 flex-1 min-w-0">
      <div class="flex items-start justify-between gap-2">
        <h3 class="font-headline text-sm font-semibold text-on-surface truncate">
          {{ offre.titre }}
        </h3>

        <span
          class="px-2.5 py-1 rounded-full text-[11px] font-semibold shrink-0"
          [ngClass]="statutClasse"
        >
          {{ statutLabel }}
        </span>
      </div>

      <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs">
        <span class="flex items-center gap-1.5 font-medium text-primary">
          <span class="material-symbols-outlined text-sm">group</span>
          {{ offre.candidatures }} candidatures
        </span>

        <span class="flex items-center gap-1.5 font-medium text-tertiary">
          <span class="material-symbols-outlined text-sm">stars</span>
          {{ offre.recommandes }} recommandés
        </span>
      </div>
    </div>
  </div>

  <hr class="border-outline-variant/70" />

  <div class="flex justify-end items-center gap-2 mt-auto">
    <button
      type="button"
      (click)="voirCandidats.emit(offre)"
      class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold
             bg-primary text-on-primary shadow-sm
             hover:shadow-md hover:scale-[1.02] transition-all duration-200"
    >
      <span class="material-symbols-outlined text-sm">stars</span>
      Voir Candidats
    </button>

    <button
      type="button"
      (click)="modifier.emit(offre)"
      class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-medium
             border border-outline-variant text-on-surface-variant
             hover:bg-surface-container hover:text-on-surface
             transition-all duration-200"
    >
      <span class="material-symbols-outlined text-sm">edit</span>
      Modifier
    </button>

    <button
      type="button"
      (click)="supprimer.emit(offre)"
      class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-medium
             border border-error text-error
             hover:bg-error-container hover:scale-[1.02]
             transition-all duration-200"
    >
      <span class="material-symbols-outlined text-sm">delete</span>
      Supprimer
    </button>
  </div>
</div>
