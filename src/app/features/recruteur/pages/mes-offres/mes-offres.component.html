<div>

  <div
    *ngIf="offres.length > 0; else vide"
    class="grid grid-cols-1 lg:grid-cols-2 gap-x-6 gap-y-8"
  >
    <app-offre-card
      *ngFor="let offre of offres"
      [offre]="offre"
      (voirCandidats)="onVoirCandidats($event)"
      (modifier)="onModifier($event)"
      (supprimer)="onSupprimer($event)"
    >
    </app-offre-card>
  </div>

  <ng-template #vide>
    <div class="flex flex-col items-center justify-center py-24 text-center text-slate-500 gap-4">
      <span class="material-symbols-outlined text-5xl">work_off</span>
      <p class="text-lg font-semibold">Aucune offre publiée</p>
      <p class="text-sm">Commencez par publier votre première offre.</p>
    </div>
  </ng-template>

</div>
