<div class="max-w-4xl mx-auto px-6 py-8">

<article class="bg-white shadow-sm border border-outline-variant/30 overflow-hidden rounded-2xl">
      <form class="divide-y divide-outline-variant/20">

        <!-- Section Identité -->
        <section class="p-8 md:p-10">
          <div class="flex items-center gap-3 mb-8">
            <span class="material-symbols-outlined text-primary">person</span>
            <h2 class="text-xl font-bold font-headline text-on-surface">Identité</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">

            <!-- Avatar -->
            <div class="md:col-span-2 flex flex-col items-center md:flex-row gap-6 mb-4">
              <div class="relative group">
                <div class="h-24 w-24 rounded-2xl overflow-hidden border-2 border-outline-variant/30 bg-surface-container-low flex items-center justify-center">
                  <img alt="Recruiter Avatar" class="object-cover h-full w-full"
                       src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAyso5ANpWlTO_GV5BZGOWCw-3v1BwAH3HmKhh5EkM7UA4YdR012TCimDE0Kb3U3s7F1WWUmxm17sxMutKg5Mq-PivD8dy8bZ0uB-R7q-9qmnzk4_ucOe7zcijj7nqxNO31IKZuHIzHH0NpWuz_zehqPla41oPmvKXeLjA_b_LWkN9GRiW1ZPVhYuyZv1jYTZAQwDfOKktfGIXTSuj5H3AMIF9apVIHBgwkKhs1df1Lm5Bgq3gVmlfjnQ4HlQtj7_IXiNnwE8RNi8"/>
                </div>
                <label class="absolute -bottom-2 -right-2 bg-primary text-white h-8 w-8 rounded-lg flex items-center justify-center cursor-pointer shadow-lg hover:bg-primary/90 transition-colors">
                  <span class="material-symbols-outlined text-base">photo_camera</span>
                  <input class="hidden" type="file"/>
                </label>
              </div>
              <div>
                <p class="font-bold text-on-surface">Photo de profil</p>
                <p class="text-xs text-on-surface-variant mt-1">JPG, PNG ou GIF. Max 5MB.</p>
              </div>
            </div>

            <!-- Prénom -->
            <div class="space-y-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Prénom</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="Jean-Pierre" type="text" value="Jean-Pierre"/>
            </div>

            <!-- Nom -->
            <div class="space-y-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Nom</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="Beaumont" type="text" value="Beaumont"/>
            </div>

            <!-- Email -->
            <div class="space-y-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Email</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="jp.beaumont@curator.com" type="email" value="jp.beaumont@curator-group.com"/>
            </div>

            <!-- Mot de passe -->
            <div class="space-y-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Mot de passe</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="••••••••" type="password" value="password123"/>
            </div>

            <!-- Téléphone -->
            <div class="space-y-2 md:col-span-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Téléphone</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="+216 71 000 000" type="tel" value="+216 71 000 000"/>
            </div>

          </div>
        </section>

        <!-- Section Entreprise -->
        <section class="p-8 md:p-10">
          <div class="flex items-center gap-3 mb-8">
            <span class="material-symbols-outlined text-primary">business</span>
            <h2 class="text-xl font-bold font-headline text-on-surface">Entreprise</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">

            <!-- Logo Upload -->
            <div class="md:col-span-2 space-y-4 mb-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Logo de l'entreprise</label>
              <div class="border-2 border-dashed border-outline-variant/30 rounded-xl p-8 flex flex-col items-center justify-center bg-surface-container-low/30 hover:bg-surface-container-low transition-colors cursor-pointer group">
                <span class="material-symbols-outlined text-4xl text-outline-variant group-hover:text-primary transition-colors mb-2">cloud_upload</span>
                <p class="text-sm font-medium text-on-surface">Cliquez pour télécharger le logo</p>
                <p class="text-xs text-on-surface-variant mt-1">SVG, PNG, JPG (max. 800x400px)</p>
                <input class="hidden" type="file"/>
              </div>
            </div>

            <!-- Nom entreprise -->
            <div class="space-y-2 md:col-span-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Nom de l'entreprise</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="Precision Curator Group" type="text" value="Precision Curator Group"/>
            </div>

            <!-- Site web -->
            <div class="space-y-2 md:col-span-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Site web</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="https://www.curator-group.com" type="url" value="https://www.curator-group.com"/>
            </div>

            <!-- Adresse -->
            <div class="space-y-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Adresse</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="Avenue Habib Bourguiba" type="text" value="Avenue Habib Bourguiba"/>
            </div>

            <!-- Ville -->
            <div class="space-y-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Ville</label>
              <input class="w-full bg-surface-bright border border-outline-variant/50 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                     placeholder="Tunis" type="text" value="Tunis"/>
            </div>

            <!-- Patente -->
            <div class="md:col-span-2 space-y-2">
              <label class="text-sm font-semibold text-on-surface-variant px-1">Patente (Registre de commerce)</label>
              <div class="border border-outline-variant/50 rounded-lg p-4 bg-surface-bright flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <span class="material-symbols-outlined text-primary">description</span>
                  <div>
                    <p class="text-sm font-medium text-on-surface">patente_2024.pdf</p>
                    <p class="text-[10px] text-on-surface-variant uppercase">Document validé</p>
                  </div>
                </div>
                <button class="text-primary hover:bg-primary/5 p-2 rounded-lg transition-colors" type="button">
                  <span class="material-symbols-outlined">refresh</span>
                </button>
              </div>
              <input class="hidden" type="file"/>
            </div>

          </div>
        </section>

      </form>
    </article>
  </div>
