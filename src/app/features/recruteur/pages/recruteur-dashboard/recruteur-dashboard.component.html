<div class="px-6 md:px-10 max-w-5xl mx-auto pb-10">
  <section class="flex flex-col gap-4">
    <app-candidate-card
      *ngFor="let c of candidates"
      [candidate]="c"
      (invite)="onInvite($event)"
      (viewProfile)="onViewProfile($event)"
      (refuse)="onRefuse($event)"
    />
  </section>
</div>
