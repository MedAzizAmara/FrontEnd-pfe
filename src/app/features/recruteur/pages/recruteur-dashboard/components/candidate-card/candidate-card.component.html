<article class="bg-white border border-slate-200 rounded-lg p-5 mt-15 pb-14 flex items-start">

  <div class="w-12 text-slate-300 font-black text-2xl pl-2">
    {{ rankFormatted }}
  </div>

  <div class="h-16 w-16 shrink-0 rounded-full overflow-hidden border-2 border-slate-100 mr-6 ml-2">
    <img [src]="candidate.photoUrl" [alt]="candidate.name" class="h-full w-full object-cover" />
  </div>

  <div class="flex-1 min-w-0 flex flex-col gap-1.5">
    <div class="flex items-center gap-2">
      <h3 class="text-base font-bold text-slate-900 truncate">{{ candidate.name }}</h3>
      <span class="text-xs text-slate-500 font-medium">— {{ candidate.title }}</span>
      <span class="text-xs text-slate-400">{{ candidate.location }}</span>
    </div>
    <div class="flex items-center gap-4 text-[11px] text-slate-500">
      <span class="flex items-center gap-1">
        <span class="material-symbols-outlined text-xs">mail</span>
        {{ candidate.email }}
      </span>
      <span class="flex items-center gap-1">
        <span class="material-symbols-outlined text-xs">call</span>
        {{ candidate.phone }}
      </span>
      <span class="flex items-center gap-1">
        <span class="material-symbols-outlined text-xs">link</span>
        {{ candidate.linkedin }}
      </span>
    </div>
  </div>

  <div class="flex flex-col items-center gap-4 ml-8">
    <div class="relative flex items-center justify-center w-14 h-14">
      <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">
        <path class="text-slate-100"
              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
              fill="none" stroke="currentColor" stroke-width="3"/>
        <path
          [attr.stroke]="scoreColor"
          [attr.stroke-dasharray]="score + ', 100'"
          d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
          fill="none" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="absolute text-[11px] font-black text-slate-700">{{ candidate.score }}%</span>
    </div>

    <div class="flex items-center gap-3 shrink-0 mt-4">
      <button (click)="onInvite()"
              class="px-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded-lg">
        Invite Candidate
      </button>
      <button (click)="onViewProfile()"
              class="px-4 py-2 border border-indigo-600 text-indigo-600 text-xs font-bold rounded-lg">
        Voir Profil
      </button>
      <button (click)="onRefuse()"
              class="px-4 py-2 border border-red-500 text-red-500 text-xs font-bold rounded-lg">
        Refuser
      </button>
    </div>
  </div>

</article>
