<div class="px-4 md:px-8 lg:px-10 max-w-4xl mx-auto pb-12">
  <div
    class="bg-surface-container-lowest border border-outline-variant rounded-2xl
           shadow-[0_10px_30px_rgba(15,25,40,0.05)] overflow-hidden"
  >
    <div class="px-6 md:px-8 pt-7 pb-5 border-b border-outline-variant bg-surface-container-low">
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">
        Recrutement
      </p>
      <h2 class="mt-1 font-headline text-2xl font-bold text-on-surface">
        Publier une nouvelle offre
      </h2>
      <p class="mt-1 text-sm text-on-surface-variant">
        Remplissez les informations du poste pour attirer les bons candidats.
      </p>
    </div>

    <form class="p-6 md:p-8 space-y-7" (ngSubmit)="onPublier()">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-on-surface-variant mb-2.5">
          Titre du poste
        </label>
        <input
          [(ngModel)]="offre.titre"
          name="titre"
          type="text"
          placeholder="Ex: Senior Full Stack Developer"
          class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant rounded-xl
                 text-sm text-on-surface placeholder:text-on-surface-variant
                 outline-none transition-all duration-200
                 focus:ring-2 focus:ring-primary/20 focus:border-primary
                 hover:border-outline"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-on-surface-variant mb-2.5">
            Type de contrat
          </label>
          <select
            [(ngModel)]="offre.typeContrat"
            name="typeContrat"
            class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant rounded-xl
                   text-sm text-on-surface outline-none
                   focus:ring-2 focus:ring-primary/20 focus:border-primary"
          >
            <option value="" disabled>Choisir un type</option>
            <option value="CDI">CDI</option>
            <option value="CDD">CDD</option>
            <option value="Stage">Stage</option>
            <option value="Freelance">Freelance</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-on-surface-variant mb-2.5">
            Localisation
          </label>
          <input
            [(ngModel)]="offre.localisation"
            name="localisation"
            type="text"
            placeholder="Tunis, Sfax, Remote..."
            class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant rounded-xl
                   text-sm text-on-surface outline-none
                   focus:ring-2 focus:ring-primary/20 focus:border-primary"
          />
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-on-surface-variant mb-2.5">
          Description du poste
        </label>
        <textarea
          [(ngModel)]="offre.description"
          name="description"
          rows="6"
          placeholder="Décrivez les missions..."
          class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant rounded-xl
                 text-sm text-on-surface outline-none resize-none
                 focus:ring-2 focus:ring-primary/20 focus:border-primary"
        ></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-on-surface-variant mb-2.5">
          Compétences requises
        </label>
        <textarea
          [(ngModel)]="offre.competencesRequises"
          name="competencesRequises"
          rows="3"
          placeholder="Ex: Angular, Java, SQL..."
          class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant rounded-xl
                 text-sm text-on-surface outline-none resize-none
                 focus:ring-2 focus:ring-primary/20 focus:border-primary"
        ></textarea>
      </div>

      <div *ngIf="erreur" class="rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-600">
        {{ erreur }}
      </div>

      <div class="pt-6 border-t border-outline-variant flex justify-between">
        <button
          type="button"
          (click)="onAnnuler()"
          class="px-5 py-3 text-sm font-medium text-on-surface-variant rounded-xl
                 hover:bg-surface-container"
        >
          Annuler
        </button>

        <button
          type="submit"
          [disabled]="chargement"
          class="px-8 py-3 text-sm font-semibold text-on-primary bg-primary rounded-xl
                 hover:opacity-90 transition disabled:opacity-60"
        >
          {{ chargement ? 'Publication...' : 'Publier l’offre' }}
        </button>
      </div>
    </form>
  </div>
</div>
