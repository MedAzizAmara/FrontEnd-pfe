<div class="px-6 md:px-10 max-w-3xl mx-auto pb-10">

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-10 space-y-8">

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Titre du poste</label>
      <input
        [(ngModel)]="offre.titre"
        name="titre"
        type="text"
        placeholder="Ex: Senior Full Stack Developer"
        class="w-full px-4 py-3 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all"
      />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Type de contrat</label>
        <select
          [(ngModel)]="offre.contrat"
          name="contrat"
          class="w-full px-4 py-3 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all appearance-none"
        >
          <option value="cdi">CDI</option>
          <option value="cdd">CDD</option>
          <option value="stage">Stage</option>
          <option value="freelance">Freelance</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Localisation</label>
        <input
          [(ngModel)]="offre.localisation"
          name="localisation"
          type="text"
          placeholder="Tunis, Sfax, Remote..."
          class="w-full px-4 py-3 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all"
        />
      </div>
    </div>

    <div class="max-w-xs">
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Date de publication</label>
      <input
        [(ngModel)]="offre.datePublication"
        name="datePublication"
        type="date"
        class="w-full px-4 py-3 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all"
      />
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Description du poste</label>
      <textarea
        [(ngModel)]="offre.description"
        name="description"
        rows="8"
        placeholder="Décrivez les missions, l'environnement de travail et les attentes..."
        class="w-full px-4 py-4 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all resize-none"
      ></textarea>
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Compétences requises</label>
      <textarea
        [(ngModel)]="offre.competences"
        name="competences"
        rows="3"
        placeholder="Ex: React, Node.js, SQL, Docker..."
        class="w-full px-4 py-4 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all resize-none"
      ></textarea>
      <p class="mt-2 text-[10px] text-slate-400 italic">Séparez les compétences par une virgule</p>
    </div>

    <div class="pt-6 border-t border-slate-100 flex justify-between items-center">
      <button
        (click)="onAnnuler()"
        class="px-6 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-lg transition-all">
        Annuler
      </button>
      <button
        (click)="onPublier()"
        class="px-10 py-3 text-sm font-black uppercase tracking-widest text-white rounded-lg shadow-lg transition-all active:scale-95"
        style="background: linear-gradient(135deg, #0040a1 0%, #0056d2 100%)">
        Publier l'offre
      </button>
    </div>

  </div>
</div>
