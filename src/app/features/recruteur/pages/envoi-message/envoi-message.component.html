<div class="px-4 sm:px-6 md:px-10 max-w-6xl mx-auto pb-12">
  <div class="grid grid-cols-1 xl:grid-cols-2 gap-8 xl:gap-10 items-start">

    <app-interview-form
      [societe]="societe"
      [poste]="poste"
      [telephone]="telephone"
      [email]="email"
      [nomRecruteur]="nomRecruteur"
      (formChange)="onFormChange($event)"
    ></app-interview-form>

    <app-letter-preview
      [societe]="societe"
      [poste]="poste"
      [date]="date"
      [heure]="heure"
      [telephone]="telephone"
      [email]="email"
      [nomRecruteur]="nomRecruteur"
      (envoyer)="onEnvoyer()"
    ></app-letter-preview>

  </div>
</div>
