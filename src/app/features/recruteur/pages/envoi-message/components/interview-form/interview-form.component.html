<div class="space-y-5">

  <!-- Header -->
  <div class="flex items-center gap-3 px-1">
    <div class="w-10 h-10 rounded-2xl bg-primary-container flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-primary text-[18px]">edit_calendar</span>
    </div>
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-on-surface-variant">
        Détails de l'entretien
      </p>
      <p class="text-sm text-on-surface-variant mt-1">
        Complétez les informations avant l’envoi de l’invitation.
      </p>
    </div>
  </div>

  <!-- Card -->
  <div
    class="bg-surface-container-lowest border border-outline-variant/50 rounded-2xl p-6 md:p-7
           shadow-[0_10px_30px_rgba(15,25,40,0.05)] space-y-5"
  >

    <div>
      <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2.5">
        Société
      </label>
      <div
        class="px-4 py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl
               text-on-surface font-semibold text-sm"
      >
        {{ societe }}
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2.5">
        Poste
      </label>
      <div
        class="px-4 py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl
               text-on-surface font-semibold text-sm"
      >
        {{ poste }}
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2.5">
          Date
        </label>
        <input
          [(ngModel)]="date"
          (ngModelChange)="onFormChange()"
          type="date"
          class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl
                 text-on-surface text-sm outline-none transition-all
                 focus:ring-2 focus:ring-primary/20 focus:border-primary
                 hover:border-outline"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2.5">
          Heure
        </label>
        <input
          [(ngModel)]="heure"
          (ngModelChange)="onFormChange()"
          type="time"
          class="w-full px-4 py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl
                 text-on-surface text-sm outline-none transition-all
                 focus:ring-2 focus:ring-primary/20 focus:border-primary
                 hover:border-outline"
        />
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2.5">
        Téléphone
      </label>
      <div
        class="px-4 py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl
               text-on-surface font-medium text-sm"
      >
        {{ telephone }}
      </div>
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2.5">
        Email
      </label>
      <div
        class="px-4 py-3.5 bg-surface-container-low border border-outline-variant/50 rounded-xl
               text-on-surface font-medium text-sm break-all"
      >
        {{ email }}
      </div>
    </div>

  </div>
</div>
