<div class="space-y-4">

  <div class="flex items-center gap-2 px-2 text-slate-400">
    <span class="material-symbols-outlined text-sm">edit_calendar</span>
    <span class="text-xs font-bold uppercase tracking-widest">Détails de l'entretien</span>
  </div>

  <div class="bg-white border border-slate-200 p-6 shadow-sm space-y-4">

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Société</label>
      <p class="px-4 py-3 bg-gray-100 rounded-lg text-slate-900 font-medium">{{ societe }}</p>
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Poste</label>
      <p class="px-4 py-3 bg-gray-100 rounded-lg text-slate-900 font-medium">{{ poste }}</p>
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Date</label>
      <input
        [(ngModel)]="date"
        (ngModelChange)="onDateChange()"
        type="date"
        class="w-full px-4 py-3 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all"
      />
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Heure</label>
      <input
        [(ngModel)]="heure"
        (ngModelChange)="onHeureChange()"
        type="time"
        class="w-full px-4 py-3 bg-gray-100 rounded-lg text-slate-900 outline-none focus:ring-2 focus:ring-blue-600 transition-all"
      />
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Téléphone</label>
      <p class="px-4 py-3 bg-gray-100 rounded-lg text-slate-900 font-medium">{{ telephone }}</p>
    </div>

    <div>
      <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Email</label>
      <p class="px-4 py-3 bg-gray-100 rounded-lg text-slate-900 font-medium">{{ email }}</p>
    </div>

  </div>
</div>
