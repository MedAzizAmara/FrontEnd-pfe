<app-navbar></app-navbar>
<app-sidebar *ngIf="authService.isLoggedIn()"></app-sidebar>

<main
  class="pt-16 min-h-screen transition-all duration-300"
  [ngClass]="{
    'ml-64': authService.isLoggedIn() && !sidebarService.isOpen,
    'ml-20': authService.isLoggedIn() && sidebarService.isOpen,
    'ml-0': !authService.isLoggedIn()
  }">
  <app-header></app-header>
  <router-outlet></router-outlet>
</main>
