<div class="min-h-screen bg-background flex items-center justify-center px-4 py-10">
  <div
    class="w-full max-w-2xl bg-surface-container-lowest border border-outline-variant/40
           rounded-3xl shadow-[0_20px_60px_rgba(15,25,40,0.08)] overflow-hidden"
  >
    <!-- Header -->
    <div class="px-6 md:px-8 pt-8 pb-6 bg-surface-container-low border-b border-outline-variant/30">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-11 h-11 rounded-2xl bg-primary text-on-primary flex items-center justify-center">
          <span class="material-symbols-outlined text-[20px]">lock</span>
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">
            Connexion
          </p>
          <h1 class="font-headline text-2xl font-bold text-on-surface">
            Bienvenue
          </h1>
        </div>
      </div>

      <p class="text-sm text-on-surface-variant">
        Connectez-vous à votre espace.
      </p>
    </div>

    <div class="px-6 md:px-8 py-7 space-y-6">
      <!-- Tabs -->
      <div class="grid grid-cols-2 gap-4">
        <div
          class="h-14 rounded-[22px] bg-surface-container text-on-surface
                 text-sm md:text-base font-semibold
                 flex items-center justify-center border border-outline-variant/40"
        >
          Connexion
        </div>

        <a
          routerLink="/register"
          class="h-14 rounded-[22px] bg-primary-container text-primary
                 text-sm md:text-base font-semibold
                 flex items-center justify-center
                 border border-primary-fixed-dim
                 hover:opacity-90 transition-opacity"
        >
          Inscription
        </a>
      </div>

      <!-- Form -->
      <form class="space-y-5" (ngSubmit)="connecter()">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
            Email
          </label>
          <input
            [(ngModel)]="form.email"
            name="email"
            type="email"
            placeholder="nom@email.com"
            class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                   text-sm text-on-surface outline-none transition-all
                   placeholder:text-on-surface-variant
                   focus:ring-2 focus:ring-primary/20 focus:border-primary"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
            Mot de passe
          </label>

          <div class="relative">
            <input
              [(ngModel)]="form.motDePasse"
              name="motDePasse"
              [type]="afficherMotDePasse ? 'text' : 'password'"
              placeholder="••••••••"
              class="w-full px-4 py-3 pr-12 rounded-2xl bg-surface-container-low border border-outline-variant
                     text-sm text-on-surface outline-none transition-all
                     placeholder:text-on-surface-variant
                     focus:ring-2 focus:ring-primary/20 focus:border-primary"
            />

            <button
              type="button"
              (click)="toggleMotDePasse()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
            >
              <span class="material-symbols-outlined text-[20px]">
                {{ afficherMotDePasse ? 'visibility_off' : 'visibility' }}
              </span>
            </button>
          </div>
        </div>

        <div *ngIf="erreur" class="rounded-2xl bg-error-container px-4 py-3 text-sm text-error">
          {{ erreur }}
        </div>

        <button
          type="submit"
          [disabled]="chargement"
          class="w-full py-3 rounded-2xl bg-primary text-on-primary text-sm font-semibold
                 shadow-sm hover:opacity-95 hover:shadow-md transition-all disabled:opacity-60"
        >
          {{ chargement ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>

      <div class="text-center">
        <p class="text-sm text-on-surface-variant">
          Vous n’avez pas encore de compte ?
          <a routerLink="/register" class="font-semibold text-primary hover:underline">
            S’inscrire
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
