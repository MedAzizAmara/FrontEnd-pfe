<div class="min-h-screen bg-background flex items-center justify-center px-4 py-10">
  <div
    class="w-full max-w-2xl bg-surface-container-lowest border border-outline-variant/40
           rounded-3xl shadow-[0_20px_60px_rgba(15,25,40,0.08)] overflow-hidden"
  >
    <div class="px-6 md:px-8 pt-8 pb-6 bg-surface-container-low border-b border-outline-variant/30">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-11 h-11 rounded-2xl bg-primary text-on-primary flex items-center justify-center">
          <span class="material-symbols-outlined text-[20px]">person_add</span>
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-primary">
            Inscription
          </p>
          <h1 class="font-headline text-2xl font-bold text-on-surface">
            Créer un compte
          </h1>
        </div>
      </div>
ng ser
      <p class="text-sm text-on-surface-variant">
        Choisissez votre profil puis complétez vos informations.
      </p>
    </div>

    <div class="px-6 md:px-8 py-7 space-y-6">
      <div class="grid grid-cols-2 gap-4">
        <a
          routerLink="/login"
          class="h-14 rounded-[22px] bg-surface-container text-on-surface
                 text-sm md:text-base font-semibold
                 flex items-center justify-center border border-outline-variant/40
                 hover:bg-surface-container-high transition-colors"
        >
          Connexion
        </a>

        <div
          class="h-14 rounded-[22px] bg-primary-container text-primary
                 text-sm md:text-base font-semibold
                 flex items-center justify-center border border-primary-fixed-dim"
        >
          Inscription
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <button
          type="button"
          (click)="choisirRole('CANDIDAT')"
          class="rounded-2xl border p-5 text-left transition-all"
          [ngClass]="roleSelectionne === 'CANDIDAT'
            ? 'border-primary bg-primary-container shadow-sm'
            : 'border-outline-variant bg-surface-container-low hover:bg-surface-container'"
        >
          <div class="w-10 h-10 rounded-xl bg-surface-container-lowest flex items-center justify-center mb-3">
            <span class="material-symbols-outlined text-primary">person</span>
          </div>
          <p class="text-sm font-semibold text-on-surface">Je suis Candidat</p>
          <p class="text-xs text-on-surface-variant mt-1">Je cherche un emploi</p>
        </button>

        <button
          type="button"
          (click)="choisirRole('RECRUTEUR')"
          class="rounded-2xl border p-5 text-left transition-all"
          [ngClass]="roleSelectionne === 'RECRUTEUR'
            ? 'border-primary bg-primary-container shadow-sm'
            : 'border-outline-variant bg-surface-container-low hover:bg-surface-container'"
        >
          <div class="w-10 h-10 rounded-xl bg-surface-container-lowest flex items-center justify-center mb-3">
            <span class="material-symbols-outlined text-primary">work</span>
          </div>
          <p class="text-sm font-semibold text-on-surface">Je suis Recruteur</p>
          <p class="text-xs text-on-surface-variant mt-1">Je recrute des talents</p>
        </button>
      </div>

      <form class="space-y-5" (ngSubmit)="inscrire()">
        <ng-container *ngIf="roleSelectionne === 'CANDIDAT'">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
                Prénom
              </label>
              <input
                [(ngModel)]="candidatForm.prenom"
                name="candidatPrenom"
                type="text"
                class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                       text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
              />
            </div>

            <div>
              <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
                Nom
              </label>
              <input
                [(ngModel)]="candidatForm.nom"
                name="candidatNom"
                type="text"
                class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                       text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
              />
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
              Email
            </label>
            <input
              [(ngModel)]="candidatForm.email"
              name="candidatEmail"
              type="email"
              class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                     text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
            />
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
              Mot de passe
            </label>
            <div class="relative">
              <input
                [(ngModel)]="candidatForm.motDePasse"
                name="candidatMotDePasse"
                [type]="afficherMotDePasse ? 'text' : 'password'"
                class="w-full px-4 py-3 pr-12 rounded-2xl bg-surface-container-low border border-outline-variant
                       text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
              />
              <button
                type="button"
                (click)="toggleMotDePasse()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
              >
                <span class="material-symbols-outlined text-[20px]">
                  {{ afficherMotDePasse ? 'visibility_off' : 'visibility' }}
                </span>
              </button>
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="roleSelectionne === 'RECRUTEUR'">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
                Prénom
              </label>
              <input
                [(ngModel)]="recruteurForm.prenom"
                name="recruteurPrenom"
                type="text"
                class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                       text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
              />
            </div>

            <div>
              <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
                Nom
              </label>
              <input
                [(ngModel)]="recruteurForm.nom"
                name="recruteurNom"
                type="text"
                class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                       text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
              />
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
              Email
            </label>
            <input
              [(ngModel)]="recruteurForm.email"
              name="recruteurEmail"
              type="email"
              class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                     text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
            />
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
              Entreprise
            </label>
            <input
              [(ngModel)]="recruteurForm.entreprise"
              name="entreprise"
              type="text"
              class="w-full px-4 py-3 rounded-2xl bg-surface-container-low border border-outline-variant
                     text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
            />
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
              Patente <span class="text-error">*</span>
            </label>
            <label
              class="flex items-center justify-between gap-3 px-4 py-3 rounded-2xl
                     bg-surface-container-low border border-outline-variant cursor-pointer hover:bg-surface-container transition-colors"
            >
              <span class="text-sm text-on-surface-variant truncate">
                {{ patenteName }}
              </span>
              <span class="material-symbols-outlined text-primary">upload</span>
              <input
                type="file"
                class="hidden"
                (change)="onPatenteChange($event)"
              />
            </label>
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
              Mot de passe
            </label>
            <div class="relative">
              <input
                [(ngModel)]="recruteurForm.motDePasse"
                name="recruteurMotDePasse"
                [type]="afficherMotDePasse ? 'text' : 'password'"
                class="w-full px-4 py-3 pr-12 rounded-2xl bg-surface-container-low border border-outline-variant
                       text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
              />
              <button
                type="button"
                (click)="toggleMotDePasse()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
              >
                <span class="material-symbols-outlined text-[20px]">
                  {{ afficherMotDePasse ? 'visibility_off' : 'visibility' }}
                </span>
              </button>
            </div>
          </div>
        </ng-container>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.14em] text-on-surface-variant mb-2">
            Confirmer le mot de passe
          </label>
          <div class="relative">
            <input
              [(ngModel)]="confirmationMotDePasse"
              name="confirmationMotDePasse"
              [type]="afficherConfirmation ? 'text' : 'password'"
              class="w-full px-4 py-3 pr-12 rounded-2xl bg-surface-container-low border border-outline-variant
                     text-sm text-on-surface outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
            />
            <button
              type="button"
              (click)="toggleConfirmation()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
            >
              <span class="material-symbols-outlined text-[20px]">
                {{ afficherConfirmation ? 'visibility_off' : 'visibility' }}
              </span>
            </button>
          </div>
        </div>

        <div *ngIf="erreur" class="rounded-2xl bg-error-container px-4 py-3 text-sm text-error">
          {{ erreur }}
        </div>

        <button
          type="submit"
          [disabled]="chargement"
          class="w-full py-3 rounded-2xl bg-primary text-on-primary text-sm font-semibold
                 shadow-sm hover:opacity-95 hover:shadow-md transition-all disabled:opacity-60"
        >
          {{ chargement ? 'Création du compte...' : 'Créer mon compte' }}
        </button>
      </form>

      <div class="text-center">
        <p class="text-sm text-on-surface-variant">
          Vous avez déjà un compte ?
          <a routerLink="/login" class="font-semibold text-primary hover:underline">
            Se connecter
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
