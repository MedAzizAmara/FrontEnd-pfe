<section class="mb-8">

  <div class="flex items-center gap-2 border-b border-blue-100 pb-2 mb-4">
    <span class="material-symbols-outlined text-blue-600">person</span>
    <h3 class="text-sm font-extrabold uppercase text-gray-800">
      Informations Personnelles
    </h3>
  </div>

  <!-- Mode affichage -->
  <div *ngIf="!isEditing" class="grid-responsive text-sm text-gray-600">
    <div class="space-y-2">
      <p><span class="font-bold text-gray-800">Âge :</span> {{ age }} ans</p>
      <p><span class="font-bold text-gray-800">Permis :</span> {{ permis }}</p>
      <p class="flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">location_on</span>
        {{ location }}
      </p>
    </div>
    <div class="space-y-2">
      <p class="flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">mail</span>
        {{ email }}
      </p>
      <p class="flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">phone_iphone</span>
        {{ phone }}
      </p>
    </div>
  </div>

  <!-- Mode édition -->
  <div *ngIf="isEditing" class="grid-responsive text-sm">
    <div class="space-y-3">
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Âge</label>
        <input type="number" [(ngModel)]="age"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Permis</label>
        <input [(ngModel)]="permis"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Localisation</label>
        <input [(ngModel)]="location"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
    </div>
    <div class="space-y-3">
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Email</label>
        <input type="email" [(ngModel)]="email"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Téléphone</label>
        <input [(ngModel)]="phone"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
    </div>
  </div>

</section>
