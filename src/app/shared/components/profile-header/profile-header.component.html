<div class="flex-responsive px-4 py-6 border-b border-gray-100">

  <!-- Avatar -->
  <div class="relative">
    <img
      [src]="avatarUrl || 'assets/default-avatar.png'"
      [alt]="fullName"
      class="w-24 h-24 rounded-full"
    />
    <label *ngIf="isEditing"
           class="absolute bottom-0 right-0 bg-blue-600 text-white rounded-full w-7 h-7 flex items-center justify-center cursor-pointer">
      <span class="material-symbols-outlined text-sm">photo_camera</span>
      <input type="file" accept="image/*" class="hidden" (change)="onAvatarChange($event)"/>
    </label>
  </div>

  <!-- Nom + titre + boutons -->
  <div class="flex flex-1 justify-between items-center gap-4">
    <div>

      <!-- Nom : toujours lecture seule -->
      <h1 class="text-2xl font-extrabold text-gray-900 uppercase">
        {{ fullName }}
      </h1>

      <!-- Job title lecture seule -->
      <h2 *ngIf="!isEditing" class="text-base font-semibold text-gray-500 uppercase mt-1">
        {{ jobTitle }}
      </h2>

      <!-- Job title éditable -->
      <input *ngIf="isEditing"
             [value]="jobTitle"
             (input)="onJobTitleChange($any($event.target).value)"
             placeholder="Titre du poste..."
             class="text-base font-semibold uppercase text-gray-500 border-b border-gray-300 bg-transparent w-full mt-1"/>

    </div>

    <!-- Bouton Modifier -->
    <button *ngIf="isOwner && !isEditing"
            (click)="editClicked.emit()"
            class="flex items-center gap-2 bg-blue-600 text-white text-sm font-bold px-5 py-2 rounded-lg shadow hover:bg-blue-700">
      <span class="material-symbols-outlined text-base">edit</span>
      Modifier profil
    </button>

    <!-- Bouton Sauvegarder -->
    <button *ngIf="isEditing"
            (click)="saveClicked.emit()"
            class="flex items-center gap-2 bg-green-600 text-white text-sm font-bold px-5 py-2 rounded-lg shadow hover:bg-green-700">
      <span class="material-symbols-outlined text-base">save</span>
      Sauvegarder
    </button>

  </div>
</div>
