<div class="min-h-screen bg-background px-4 py-8 md:px-8 lg:px-10">
  <div class="mx-auto max-w-7xl">
    <div class="rounded-2xl border border-outline-variant/50 bg-surface-container-lowest p-6 shadow-sm md:p-8 lg:p-10">
      <div class="space-y-8">

        <app-profile-header
          [personalInfo]="personalInfo"
          [isEditing]="isEditing"
          (toggleEdit)="onToggleEdit()"
          (cancelEdit)="onCancelEdit()">
        </app-profile-header>

        <div class="grid grid-cols-1 gap-8 xl:grid-cols-3">
          <div class="space-y-6 xl:col-span-1">
            <app-personal-info
              [(personalInfo)]="personalInfo"
              [isEditing]="isEditing">
            </app-personal-info>

            <app-skills-section
              [(competences)]="competences"
              [isEditing]="isEditing">
            </app-skills-section>

            <app-languages-section
              [(langues)]="langues"
              [isEditing]="isEditing">
            </app-languages-section>
          </div>

          <div class="space-y-6 xl:col-span-2">
            <app-experience-section
              [(experiences)]="experiences"
              [isEditing]="isEditing">
            </app-experience-section>

            <app-education-section
              [(formations)]="formations"
              [isEditing]="isEditing">
            </app-education-section>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
