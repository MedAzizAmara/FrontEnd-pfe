<aside class="fixed left-0 top-0 z-30 flex h-screen w-16 flex-col border-r border-outline-variant bg-surface-container-lowest lg:w-64">
  <div class="flex h-16 flex-shrink-0 items-center justify-center gap-2.5 px-3 lg:justify-start lg:px-5">
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary">
      <span class="material-symbols-outlined text-sm text-on-primary">work</span>
    </div>
    <span class="hidden font-headline text-base font-bold text-on-surface lg:block">
      ToutaJob
    </span>
  </div>

  <!-- NAV CANDIDAT -->
  <nav
    class="flex flex-1 flex-col space-y-1 overflow-y-auto px-3 py-4"
    *ngIf="authService.getRole() === 'CANDIDAT'"
  >
    <div>
      <p class="hidden px-3 pb-2 text-xs font-semibold uppercase tracking-widest text-on-surface-variant lg:block">
        Espace candidat
      </p>

      <a
        routerLink="/candidat/dashboard"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">dashboard</span>
        <span class="hidden lg:inline">Dashboard</span>
      </a>

      <a
        routerLink="/candidat/job-list"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">search</span>
        <span class="hidden lg:inline">Offres</span>
      </a>

      <a
        routerLink="/candidat/entretiens"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">calendar_month</span>
        <span class="hidden lg:inline">Entretiens</span>
      </a>

      <a
        routerLink="/candidat/profil"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">person</span>
        <span class="hidden lg:inline">Mon profil</span>
      </a>
    </div>

    <div class="mt-auto border-t border-outline-variant pt-4">
      <button
        (click)="deconnecter()"
        class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-error transition-colors hover:bg-error-container"
      >
        <span class="material-symbols-outlined">logout</span>
        <span class="hidden lg:inline">Déconnexion</span>
      </button>
    </div>
  </nav>

  <!-- NAV RECRUTEUR -->
  <nav
    class="flex flex-1 flex-col space-y-1 overflow-y-auto px-3 py-4"
    *ngIf="authService.getRole() === 'RECRUTEUR'"
  >
    <div>
      <p class="hidden px-3 pb-2 text-xs font-semibold uppercase tracking-widest text-on-surface-variant lg:block">
        Espace recruteur
      </p>

      <a
        routerLink="/recruteur/recruteur-home"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">dashboard</span>
        <span class="hidden lg:inline">Dashboard</span>
      </a>

      <a
        routerLink="/recruteur/offres"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">work</span>
        <span class="hidden lg:inline">Mes offres</span>
      </a>

      <a
        routerLink="/recruteur/offres/nouvelle"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">add_circle</span>
        <span class="hidden lg:inline">Publier une offre</span>
      </a>

      <a
        routerLink="/recruteur/profil"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">person</span>
        <span class="hidden lg:inline">Mon profil</span>
      </a>
    </div>

    <div class="mt-auto border-t border-outline-variant pt-4">
      <button
        (click)="deconnecter()"
        class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-error transition-colors hover:bg-error-container"
      >
        <span class="material-symbols-outlined">logout</span>
        <span class="hidden lg:inline">Déconnexion</span>
      </button>
    </div>
  </nav>

  <!-- NAV ADMIN -->
  <nav
    class="flex flex-1 flex-col space-y-1 overflow-y-auto px-3 py-4"
    *ngIf="authService.getRole() === 'ADMIN'"
  >
    <div>
      <p class="hidden px-3 pb-2 text-xs font-semibold uppercase tracking-widest text-on-surface-variant lg:block">
        Espace admin
      </p>

      <a
        routerLink="/admin/recruteurs"
        routerLinkActive="bg-primary-container text-primary font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container"
      >
        <span class="material-symbols-outlined">groups</span>
        <span class="hidden lg:inline">Recruteurs</span>
      </a>
    </div>

    <div class="mt-auto border-t border-outline-variant pt-4">
      <button
        (click)="deconnecter()"
        class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-error transition-colors hover:bg-error-container"
      >
        <span class="material-symbols-outlined">logout</span>
        <span class="hidden lg:inline">Déconnexion</span>
      </button>
    </div>
  </nav>
</aside>
