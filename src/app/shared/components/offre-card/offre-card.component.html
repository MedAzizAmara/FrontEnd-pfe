<div class="bg-white p-6 pb-14 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow flex flex-col lg:flex-row lg:items-end justify-between gap-6">

  <!-- Infos -->
  <div class="flex gap-6 items-center">
    <div class="h-16 w-16 bg-blue-50 rounded-xl flex items-center justify-center text-primary">
      <span class="material-symbols-outlined text-3xl">{{ offre.icone }}</span>
    </div>
    <div>
      <div class="flex items-center gap-3 mb-1">
        <h3 class="font-headline text-lg font-bold text-on-surface">{{ offre.titre }}</h3>
        <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider"
              [ngClass]="statutClasse">
          {{ statutLabel }}
        </span>
      </div>
      <div class="flex flex-wrap gap-x-6 gap-y-2 text-sm text-slate-500">
        <span class="flex items-center gap-1 font-semibold text-primary">
          <span class="material-symbols-outlined text-xs">group</span>
          {{ offre.candidatures }} candidatures
        </span>
        <span class="flex items-center gap-1 font-semibold text-green-600">
          <span class="material-symbols-outlined text-xs">stars</span>
          {{ offre.recommandes }} recommandés
        </span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-3 shrink-0 mb-[-40px]">
    <button
      (click)="voirCandidats.emit(offre)"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold text-white shadow-md hover:brightness-110 active:scale-95 transition-all"
      style="background: linear-gradient(135deg, #0040a1 0%, #0056d2 100%)">
      <span class="material-symbols-outlined text-sm">stars</span>
      Voir candidats
    </button>
    <button
      (click)="modifier.emit(offre)"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold border border-slate-300 text-slate-700 hover:bg-slate-50 transition-all">
      <span class="material-symbols-outlined text-sm">edit</span>
      Modifier
    </button>
    <button
      (click)="supprimer.emit(offre)"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold border border-red-300 text-red-500 hover:bg-red-50 transition-all">
      <span class="material-symbols-outlined text-sm">delete</span>
      Supprimer
    </button>
  </div>

</div>
