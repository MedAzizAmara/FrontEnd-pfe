<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-5
            hover:shadow-md transition-all duration-200 mb-4 group cursor-pointer">

  <div class="flex gap-4 items-center">
    <div class="w-12 h-12 rounded-lg overflow-hidden flex-shrink-0
                bg-surface-container border border-outline-variant">
      <img class="w-full h-full object-cover" [src]="logoUrl" [alt]="company + ' logo'" />
    </div>

    <div class="flex-grow min-w-0">
      <div class="flex items-start justify-between gap-3">
        <h2 class="font-headline text-base font-semibold text-on-surface leading-snug
                   group-hover:text-primary transition-colors truncate">
          {{ title }}
        </h2>

        <div class="flex items-center gap-2">
          <span
            *ngIf="matchScore !== null && mode === 'candidat'"
            class="text-xs font-semibold px-2.5 py-1 rounded-full
                   bg-secondary-container text-secondary"
          >
            Match {{ matchScore }}%
          </span>

          <span class="text-xs font-semibold px-2.5 py-1 rounded-full
                       bg-primary-container text-primary">
            {{ statut }}
          </span>
        </div>
      </div>

      <div class="flex flex-wrap gap-x-4 gap-y-1 text-sm text-on-surface-variant mt-1.5">
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-primary text-base">corporate_fare</span>
          <span class="font-medium text-on-surface">{{ company }}</span>
        </div>

        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-on-surface-variant text-base">mail</span>
          <span>{{ email }}</span>
        </div>

        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-on-surface-variant text-base">location_on</span>
          <span>{{ location }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="border-t border-outline-variant mt-4 pt-3 flex justify-end gap-2">
    <button
      type="button"
      (click)="voirDetails.emit()"
      class="px-4 py-2 text-sm font-medium rounded-lg border border-outline-variant
             text-on-surface-variant hover:bg-surface-container transition-colors"
    >
      Voir détails
    </button>

    <button
      *ngIf="afficherActionsCandidat"
      type="button"
      (click)="postuler.emit()"
      class="px-4 py-2 text-sm font-medium rounded-lg bg-primary text-on-primary
             hover:opacity-90 transition-opacity"
    >
      Postuler
    </button>

    <button
      *ngIf="afficherActionsRecruteur"
      type="button"
      (click)="voirCandidats.emit()"
      class="px-4 py-2 text-sm font-medium rounded-lg border border-outline-variant
             text-on-surface hover:bg-surface-container transition-colors"
    >
      Candidats
    </button>

    <button
      *ngIf="afficherActionsRecruteur"
      [routerLink]="['/recruteur/offres', id, 'modifier']"
      class="px-4 py-2 text-sm font-medium rounded-lg border border-outline-variant
             text-on-surface hover:bg-surface-container transition-colors"
    >
      Modifier
    </button>

    <button
      *ngIf="afficherActionsRecruteur"
      (click)="supprimer.emit()"
      class="px-4 py-2 text-sm font-medium rounded-lg bg-error text-on-error
             hover:opacity-90 transition-opacity"
    >
      Supprimer
    </button>
  </div>
</div>
