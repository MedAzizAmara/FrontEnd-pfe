<!-- COMPÉTENCES -->
<section class="mb-8">

  <div class="flex items-center gap-2 border-b border-blue-100 pb-2 mb-4">
    <span class="material-symbols-outlined text-blue-600">psychology</span>
    <h3 class="text-sm font-extrabold uppercase text-gray-800">
      Compétences
    </h3>
  </div>

  <!-- Mode affichage -->
  <div *ngIf="!isEditing" class="space-y-4">
    <div *ngFor="let group of skillGroups">
      <h4 class="text-xs font-extrabold uppercase text-gray-700 mb-2">
        {{ group.groupTitle }}
      </h4>
      <ul class="list-disc pl-4 space-y-1">
        <li *ngFor="let skill of group.skills" class="text-sm text-gray-600">
          {{ skill }}
        </li>
      </ul>
    </div>
  </div>

  <!-- Mode édition -->
  <div *ngIf="isEditing" class="space-y-4">
    <div *ngFor="let group of skillGroups">
      <input [(ngModel)]="group.groupTitle"
             class="text-xs font-extrabold uppercase text-gray-700 w-full border-b border-blue-200 bg-transparent mb-2"/>
      <ul class="space-y-2">
        <li *ngFor="let skill of group.skills; let si = index"
            class="flex items-center gap-2">
          <input [(ngModel)]="group.skills[si]"
                 class="flex-1 text-sm text-gray-600 border-b border-gray-200 bg-transparent"/>
          <button (click)="removeSkill(group, si)"
                  class="text-red-400 hover:text-red-600 text-xs">🗑️</button>
        </li>
      </ul>
      <button (click)="addSkill(group)"
              class="text-xs text-blue-500 hover:text-blue-700 font-bold mt-2">
        + Ajouter une compétence
      </button>
    </div>
  </div>

</section>

<!-- LANGUES -->
<section class="mb-8">

  <div class="flex items-center gap-2 border-b border-blue-100 pb-2 mb-4">
    <span class="material-symbols-outlined text-blue-600">translate</span>
    <h3 class="text-sm font-extrabold uppercase text-gray-800">
      Langues
    </h3>
  </div>

  <!-- Mode affichage -->
  <div *ngIf="!isEditing" class="space-y-4">
    <div *ngFor="let lang of languages" class="flex items-center gap-3">
      <span class="text-sm font-bold text-gray-800 w-20">{{ lang.name }}</span>
      <div class="flex-1 h-2 bg-gray-100 rounded-full">
        <div class="h-2 bg-blue-600 rounded-full" [style.width.%]="lang.percent"></div>
      </div>
      <span class="text-sm font-bold text-blue-600 w-8">{{ lang.level }}</span>
      <span *ngIf="lang.note" class="text-xs text-gray-400">{{ lang.note }}</span>
    </div>
  </div>

  <!-- Mode édition -->
  <div *ngIf="isEditing" class="space-y-3">
    <div *ngFor="let lang of languages; let i = index"
         class="flex items-center gap-2">
      <input [(ngModel)]="lang.name" placeholder="Langue"
             class="w-20 text-sm font-bold text-gray-800 border-b border-gray-200 bg-transparent"/>
      <select [(ngModel)]="lang.level" (ngModelChange)="onLevelChange(lang)"
              class="text-sm text-blue-600 font-bold border border-gray-200 rounded px-1 bg-white">
        <option *ngFor="let l of ['A1','A2','B1','B2','C1','C2']">{{ l }}</option>
      </select>
      <div class="flex-1 h-2 bg-gray-100 rounded-full">
        <div class="h-2 bg-blue-600 rounded-full" [style.width.%]="lang.percent"></div>
      </div>
      <button (click)="removeLanguage(i)"
              class="text-red-400 hover:text-red-600 text-xs">🗑️</button>
    </div>

    <button (click)="addLanguage()"
            class="text-xs text-blue-500 hover:text-blue-700 font-bold mt-1">
      + Ajouter une langue
    </button>
  </div>

</section>
