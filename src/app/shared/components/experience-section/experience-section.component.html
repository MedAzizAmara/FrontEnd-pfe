<section class="mb-8">

  <div class="flex items-center gap-2 border-b border-blue-100 pb-2 mb-4">
    <span class="material-symbols-outlined text-blue-600">work</span>
    <h3 class="text-sm font-extrabold uppercase text-gray-800">
      Expériences
    </h3>
  </div>

  <!-- Mode affichage -->
  <div *ngIf="!isEditing" class="space-y-6">
    <div *ngFor="let exp of experiences">
      <h4 class="text-sm font-extrabold uppercase text-gray-800">{{ exp.title }}</h4>
      <p class="text-xs text-gray-500 mb-2">{{ exp.company }} - {{ exp.period }}</p>
      <ul class="list-disc pl-4 space-y-1">
        <li *ngFor="let task of exp.tasks" class="text-sm text-gray-600">{{ task }}</li>
      </ul>
    </div>
  </div>

  <!-- Mode édition -->
  <div *ngIf="isEditing" class="space-y-6">
    <div *ngFor="let exp of experiences; let ei = index"
         class="border border-gray-100 rounded-lg p-4 space-y-3">

      <div class="flex justify-end">
        <button (click)="removeExperience(ei)"
                class="text-red-400 hover:text-red-600 text-xs font-bold">
          🗑️ Supprimer
        </button>
      </div>

      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Titre du poste</label>
        <input [(ngModel)]="exp.title"
               class="w-full border-b border-gray-200 text-sm font-bold uppercase text-gray-800 bg-transparent mt-1"/>
      </div>

      <div class="grid-responsive">
        <div>
          <label class="text-xs font-bold text-gray-500 uppercase">Entreprise</label>
          <input [(ngModel)]="exp.company"
                 class="w-full border-b border-gray-200 text-sm text-gray-600 bg-transparent mt-1"/>
        </div>
        <div>
          <label class="text-xs font-bold text-gray-500 uppercase">Période</label>
          <input [(ngModel)]="exp.period"
                 class="w-full border-b border-gray-200 text-sm text-gray-600 bg-transparent mt-1"/>
        </div>
      </div>

      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Tâches</label>
        <ul class="space-y-2 mt-1">
          <li *ngFor="let task of exp.tasks; let ti = index" class="flex items-center gap-2">
            <input [(ngModel)]="exp.tasks[ti]"
                   class="flex-1 text-sm text-gray-600 border-b border-gray-200 bg-transparent"/>
            <button (click)="removeTask(exp, ti)"
                    class="text-red-400 hover:text-red-600 text-xs">🗑️</button>
          </li>
        </ul>
        <button (click)="addTask(exp)"
                class="text-xs text-blue-500 hover:text-blue-700 font-bold mt-2">
          + Ajouter une tâche
        </button>
      </div>

    </div>

    <button (click)="addExperience()"
            class="text-xs text-blue-500 hover:text-blue-700 font-bold">
      + Ajouter une expérience
    </button>
  </div>

</section>
