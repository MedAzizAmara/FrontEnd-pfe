<section class="mb-8">

  <div class="flex items-center gap-2 border-b border-blue-100 pb-2 mb-4">
    <span class="material-symbols-outlined text-blue-600">school</span>
    <h3 class="text-sm font-extrabold uppercase text-gray-800">
      Formations
    </h3>
  </div>

  <!-- Mode affichage -->
  <ul *ngIf="!isEditing" class="list-disc pl-4 space-y-2">
    <li *ngFor="let edu of educations" class="text-sm text-gray-600">
      <span class="font-bold text-gray-800">{{ edu.period }}</span>
      - {{ edu.school }} - {{ edu.degree }}
    </li>
  </ul>

  <!-- Mode édition -->
  <div *ngIf="isEditing" class="space-y-3">
    <div *ngFor="let edu of educations; let i = index"
         class="border border-gray-100 rounded-lg p-4 space-y-2">

      <div class="flex justify-end">
        <button (click)="removeEducation(i)"
                class="text-red-400 hover:text-red-600 text-xs font-bold">
          🗑️ Supprimer
        </button>
      </div>

      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Période</label>
        <input [(ngModel)]="edu.period"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Établissement</label>
        <input [(ngModel)]="edu.school"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Diplôme</label>
        <input [(ngModel)]="edu.degree"
               class="w-full border-b border-gray-200 text-sm text-gray-700 bg-transparent mt-1"/>
      </div>
    </div>

    <button (click)="addEducation()"
            class="text-xs text-blue-500 hover:text-blue-700 font-bold">
      + Ajouter une formation
    </button>
  </div>

</section>
