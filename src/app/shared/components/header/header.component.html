<header class="fixed top-0 right-0 left-0 lg:left-64 z-40 bg-white border-b border-slate-100 shadow-sm">

  <div class="grid border-t border-slate-100"
       [style.grid-template-columns]="'repeat(' + pageHeaderService.stats.length + ', 1fr)'">

    <div *ngFor="let stat of pageHeaderService.stats"
         class="px-8 py-6 border-r border-slate-100 last:border-r-0">
      <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">{{ stat.label }}</p>
      <p class="text-3xl font-bold text-blue-600">{{ stat.valeur }}</p>
    </div>

  </div>

</header>
